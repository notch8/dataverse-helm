{{- if .Values.internalSolr.enabled }}
{{- if not .Values.solrInit.enabled }}{{ fail "internalSolr.enabled requires solrInit.enabled (initContainer waits for core)" }}{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dataverseup.fullname" . }}-solr
  labels:
    {{- include "dataverseup.internalSolrLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dataverseup.internalSolrSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dataverseup.internalSolrSelectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: {{ .Values.internalSolr.podSecurityContext.fsGroup }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.solrInit.confConfigMap }}
        # Legacy path: vanilla Solr image + conf files supplied via ConfigMap.
        # Not needed when using the purpose-built Dataverse Solr image (conf is baked in).
        - name: solr-install-configset
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -ec
            - |
              mkdir -p /configsets/dv
              if [ -f /cm/solr-conf.tgz ]; then
                tar -xzf /cm/solr-conf.tgz -C /configsets/dv
              else
                cp -a /cm/. /configsets/dv/
              fi
              chown -R 8983:8983 /configsets
          volumeMounts:
            - name: solr-configset
              mountPath: /configsets
            - name: solr-conf-cm
              mountPath: /cm
              readOnly: true
        {{- end }}
        - name: solr-datadir-perms
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/solr/data
              chown -R {{ .Values.internalSolr.podSecurityContext.fsGroup }}:{{ .Values.internalSolr.podSecurityContext.fsGroup }} /var/solr/data
          volumeMounts:
            - name: solr-datadir
              mountPath: /var/solr/data
      containers:
        - name: solr
          image: {{ .Values.internalSolr.image | quote }}
          imagePullPolicy: {{ .Values.internalSolr.imagePullPolicy }}
          {{- if .Values.solrInit.confConfigMap }}
          # Vanilla Solr image: configset was staged to emptyDir by init container.
          args: ["solr-precreate", "dataverse", "/opt/solr/server/solr/configsets/dv"]
          {{- end }}
          {{- /* Purpose-built image: CMD already runs solr-precreate with the baked-in configset. */}}
          ports:
            - containerPort: 8983
              name: solr-http
          volumeMounts:
            {{- if .Values.solrInit.confConfigMap }}
            - name: solr-configset
              mountPath: /opt/solr/server/solr/configsets
              readOnly: true
            {{- end }}
            - name: solr-datadir
              mountPath: /var/solr/data
          readinessProbe:
            httpGet:
              path: /solr/dataverse/admin/ping
              port: 8983
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /solr/dataverse/admin/ping
              port: 8983
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          {{- with .Values.internalSolr.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if .Values.solrInit.confConfigMap }}
        - name: solr-configset
          emptyDir: {}
        - name: solr-conf-cm
          configMap:
            name: {{ .Values.solrInit.confConfigMap | quote }}
        {{- end }}
        - name: solr-datadir
          {{- if .Values.internalSolr.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "dataverseup.fullname" . }}-solr-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
