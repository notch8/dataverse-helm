{{- if .Values.internalPostgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dataverseup.postgresHost" . }}
  labels:
    {{- include "dataverseup.internalPostgresLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "dataverseup.internalPostgresSelectorLabels" . | nindent 4 }}
{{- end }}
