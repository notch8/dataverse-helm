name: Build and push Dataverse Solr image

on:
  push:
    branches:
      - main
    paths:
      - "docker/solr/Dockerfile"
      - "charts/Chart.yaml"
    tags:
      - "v*"
  pull_request:
    paths:
      - "docker/solr/Dockerfile"
      - "charts/Chart.yaml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dataverse-solr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract versions from Chart.yaml
        id: versions
        run: |
          APP_VERSION=$(grep '^appVersion:' charts/Chart.yaml | sed 's/appVersion:[[:space:]]*//' | tr -d '"')
          # Image tag matches the Dataverse Docker image tag (e.g. 6.10.1-noble-r0).
          # GitHub release tag uses only the base version (e.g. v6.10.1), so strip the distro suffix.
          BASE_VERSION="${APP_VERSION%%-*}"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Dataverse app version: ${APP_VERSION}, GitHub base version: ${BASE_VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.app_version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/solr
          file: docker/solr/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATAVERSE_VERSION=${{ steps.versions.outputs.base_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
